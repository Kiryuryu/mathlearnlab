# Nginx production configuration for MathLearnLab
# Place at /etc/nginx/sites-available/mathlearnlab

upstream fastapi {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name _;  # Replace with your domain

    # Max upload for OCR images
    client_max_body_size 10M;

    # Static files — nginx serves directly
    location /static/ {
        alias /opt/apps/mathlearnlab/server/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /data/ {
        alias /opt/apps/mathlearnlab/data/;
    }

    # API and page routes — proxy to FastAPI
    location / {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (critical for AI chat streaming)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
