# Nginx production configuration for MathLearnLab
# Place at /etc/nginx/conf.d/mathlearnlab.conf

upstream fastapi {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name mathlearnlab.cn www.mathlearnlab.cn 8.137.78.250;

    # Max upload for OCR images
    client_max_body_size 10M;

    # ── API & data — proxy to FastAPI ──
    location /api/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location /data/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
    }

    location /static/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
    }

    # ── All other routes → proxy to FastAPI (Jinja2 museum pages) ──
    location / {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
