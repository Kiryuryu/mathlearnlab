{% extends "base.html" %}
{% block title %}{{ topic.zh }} — 练习{% endblock %}
{% block content %}
<div style="padding:32px;max-width:900px;margin:0 auto;">
  <h2>{{ topic.zh }} — 练习</h2>
  <p style="color:var(--text-secondary);">选题 → 纸笔作答 → 拍照上传 → AI 批改</p>
  <p id="practiceStatus" style="color:var(--accent);font-size:13px;"></p>

  <div id="practiceApp">
    <!-- Phase 1: Select -->
    <div id="phaseSelect">
      <div class="random-actions">
        <button class="btn btn-primary" onclick="PracticeV2.randomProblem()">随机抽题</button>
        <button class="btn" onclick="PracticeV2.aiGenerate()" style="border-color:var(--accent-warm);color:var(--accent-warm);">AI 出题</button>
      </div>
      <div style="margin:8px 0;">
        <label style="font-size:13px;color:var(--text-muted);">筛选难度：</label>
        <select id="diffFilter" onchange="PracticeV2.filterProblems()" class="chat-model-select">
          <option value="all">全部</option>
          <option value="easy">简单</option>
          <option value="medium">中等</option>
          <option value="hard">困难</option>
        </select>
        <span style="margin-left:12px;font-size:13px;color:var(--text-muted);" id="problemCount"></span>
      </div>
      <div id="problemList"></div>
    </div>

    <!-- Phase 2: Solve -->
    <div id="phaseSolve" style="display:none;">
      <button class="btn btn-sm" onclick="PracticeV2.goToPhase('select')" style="margin-bottom:12px;">← 返回选题</button>
      <div id="solveContent"></div>
    </div>

    <!-- Phase 3: Results -->
    <div id="phaseResults" style="display:none;">
      <div id="resultsContent"></div>
    </div>
  </div>
</div>

<script>
  PracticeV2.init('{{ topic_key }}');
  document.addEventListener('DOMContentLoaded', function() { PracticeV2.loadProblems(); });
</script>
{% endblock %}
