{% extends "base.html" %}
{% block title %}{{ topic.zh }} — 练习{% endblock %}
{% block content %}
<div class="practice-page">
  <!-- Header -->
  <div class="practice-header">
    <a href="/exhibit/{{ topic_key }}" class="practice-back">&larr; {{ topic.zh }}</a>
    <h1>练习</h1>
    <div class="practice-steps" id="practiceSteps">
      <span class="practice-step active" data-phase="select">选题</span>
      <span class="practice-step-arrow">&rarr;</span>
      <span class="practice-step" data-phase="solve">作答</span>
      <span class="practice-step-arrow">&rarr;</span>
      <span class="practice-step" data-phase="results">批改</span>
    </div>
  </div>

  <!-- Phase 1: Select -->
  <div id="phaseSelect" class="practice-phase">
    <div class="practice-toolbar">
      <div class="practice-filter">
        <button class="filter-chip active" data-diff="all">全部</button>
        <button class="filter-chip" data-diff="basic">基础</button>
        <button class="filter-chip" data-diff="advanced">进阶</button>
        <button class="filter-chip" data-diff="exam">考研</button>
        <button class="filter-chip" data-diff="graduate">研究生</button>
        <button class="filter-chip" data-diff="phd">博士</button>
      </div>
      <div class="practice-actions">
        <button class="btn" onclick="PracticeV2.aiGenerate()" style="border-color:var(--accent-warm);color:var(--accent-warm);">生成新题</button>
        <button class="btn btn-primary" onclick="PracticeV2.randomProblem()">随机抽题</button>
      </div>
    </div>
    <p id="practiceStatus" style="text-align:center;color:var(--accent);font-size:13px;margin:8px 0;"></p>
    <div id="problemList" class="practice-problem-list"></div>
    <select id="diffFilter" style="display:none;"><option value="all">全部</option><option value="basic">基础</option><option value="advanced">进阶</option><option value="exam">考研</option><option value="graduate">研究生</option><option value="phd">博士</option></select>
  </div>

  <!-- Phase 2: Solve -->
  <div id="phaseSolve" class="practice-phase" style="display:none;">
    <div id="solveContent"></div>
  </div>

  <!-- Phase 3: Results -->
  <div id="phaseResults" class="practice-phase" style="display:none;">
    <div id="resultsContent"></div>
  </div>
</div>

<script>
PracticeV2.init('{{ topic_key }}');
document.addEventListener('DOMContentLoaded', function() { PracticeV2.loadProblems(); });

// Filter chips
document.querySelector('.practice-filter').addEventListener('click', function(e) {
  var chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
  chip.classList.add('active');
  document.getElementById('diffFilter').value = chip.dataset.diff;
  PracticeV2.filterProblems();
});
</script>
{% endblock %}
