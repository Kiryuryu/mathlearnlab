{% extends "base.html" %}
{% block title %}函数工坊{% endblock %}
{% block content %}
<div class="workshop-layout">
  <!-- Left: Input Panel -->
  <div class="workshop-sidebar">
    <h2 style="font-size:20px;margin:0 0 4px;">函数工坊</h2>
    <p style="font-size:12px;color:var(--text-muted);margin:0 0 20px;">输入函数，画出它的样子。支持 2D 曲线和 3D 曲面。</p>

    <!-- Mode Tabs -->
    <div class="ws-mode-tabs" id="wsModeTabs">
      <button class="ws-mode-tab active" data-mode="2d" onclick="workshopSetMode('2d')">2D 曲线</button>
      <button class="ws-mode-tab" data-mode="3d" onclick="workshopSetMode('3d')">3D 曲面</button>
      <button class="ws-mode-tab" data-mode="ai" onclick="workshopSetMode('ai')">AI 增强</button>
    </div>

    <!-- 2D/3D Input -->
    <div id="wsInputStd">
      <label style="font-size:12px;color:var(--text-muted);display:block;margin:12px 0 4px;">函数表达式（每行一个）</label>
      <textarea id="funcInput" placeholder="2D: y = f(x)  如 sin(x), x^2, exp(x)
3D: z = f(x,y)  如 x^2 + y^2, sin(sqrt(x^2+y^2))" rows="3" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-mono);font-size:13px;resize:vertical;background:var(--bg-input);color:var(--text-primary);"></textarea>

      <div id="ws2DFields" style="margin-top:8px;">
        <div style="display:flex;gap:8px;align-items:center;">
          <label style="font-size:12px;color:var(--text-muted);">x 范围:</label>
          <input id="xMin" type="number" value="-6" style="width:60px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg-input);color:var(--text-primary);">
          <span style="font-size:12px;color:var(--text-muted);">至</span>
          <input id="xMax" type="number" value="6" style="width:60px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg-input);color:var(--text-primary);">
        </div>
        <label style="font-size:12px;color:var(--text-muted);margin-top:6px;display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="showDerivative"> 显示导函数 f'(x)
        </label>
      </div>

      <div id="ws3DFields" style="display:none;margin-top:8px;">
        <div style="font-size:12px;color:var(--text-muted);">xy 范围: [-5, 5] × [-5, 5]，采样 80×80 网格</div>
      </div>

      <button class="btn btn-primary" onclick="workshopPlot()" style="width:100%;margin-top:12px;padding:10px;font-size:14px;justify-content:center;">绘制</button>
    </div>

    <!-- AI Input -->
    <div id="wsInputAI" style="display:none;">
      <label style="font-size:12px;color:var(--text-muted);display:block;margin:12px 0 4px;">用自然语言描述你想画的图</label>
      <textarea id="aiDesc" placeholder="例如：
画出 f(x)=sin(x)+sin(2x)/2+sin(3x)/3 从 -2π 到 2π
画一个 z=x^2-y^2 的马鞍面
用极坐标画 r=1+cos(θ) 的心形线
展示泰勒级数逼近 sin(x) 的过程" rows="4" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;resize:vertical;background:var(--bg-input);color:var(--text-primary);font-family:var(--font-body);"></textarea>
      <button class="btn btn-primary" onclick="workshopPlot()" style="width:100%;margin-top:12px;padding:10px;font-size:14px;justify-content:center;">AI 生成</button>
    </div>

    <!-- Presets -->
    <div style="margin-top:16px;">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:600;">预设函数</div>
      <div class="ws-preset-group">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">基础函数</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;">
          <button class="ws-preset-btn" onclick="workshopPreset('sin(x)')" title="正弦波">sin(x)</button>
          <button class="ws-preset-btn" onclick="workshopPreset('x^2')">x²</button>
          <button class="ws-preset-btn" onclick="workshopPreset('x^3 - 3*x')">x³-3x</button>
          <button class="ws-preset-btn" onclick="workshopPreset('1/x')">1/x</button>
          <button class="ws-preset-btn" onclick="workshopPreset('exp(x)')">eˣ</button>
          <button class="ws-preset-btn" onclick="workshopPreset('abs(x)')">|x|</button>
          <button class="ws-preset-btn" onclick="workshopPreset('sqrt(x)')">√x</button>
          <button class="ws-preset-btn" onclick="workshopPreset('x*sin(1/x)')">x·sin(1/x)</button>
        </div>
      </div>
      <div class="ws-preset-group">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">极限相关</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;">
          <button class="ws-preset-btn" onclick="workshopPreset('(x^2-1)/(x-1)')">(x²-1)/(x-1)</button>
          <button class="ws-preset-btn" onclick="workshopPreset('sin(x)/x')">sin(x)/x</button>
          <button class="ws-preset-btn" onclick="workshopPreset('(1+1/x)^x')">(1+1/x)^x</button>
        </div>
      </div>
      <div class="ws-preset-group">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">级数/傅里叶</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;">
          <button class="ws-preset-btn" onclick="workshopPreset('sin(x)\nsin(x)+sin(3*x)/3\nsin(x)+sin(3*x)/3+sin(5*x)/5')">方波傅里叶</button>
          <button class="ws-preset-btn" onclick="workshopPreset('x\nx-x^3/6\nx-x^3/6+x^5/120')">泰勒sin(x)</button>
        </div>
      </div>
      <div class="ws-preset-group">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">3D 曲面</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;">
          <button class="ws-preset-btn" onclick="workshopPreset('x^2 + y^2');workshopSetMode('3d')">碗形 z=x²+y²</button>
          <button class="ws-preset-btn" onclick="workshopPreset('x^2 - y^2');workshopSetMode('3d')">马鞍面</button>
          <button class="ws-preset-btn" onclick="workshopPreset('sin(sqrt(x^2+y^2))');workshopSetMode('3d')">涟漪</button>
          <button class="ws-preset-btn" onclick="workshopPreset('exp(-(x^2+y^2))');workshopSetMode('3d')">高斯钟形</button>
        </div>
      </div>
    </div>

    <!-- Course Links -->
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">配合课程学习</div>
      <a href="/gaoshu" class="btn btn-sm" style="width:100%;justify-content:center;margin-bottom:6px;">高等数学</a>
      <a href="/exhibit/limits" class="btn btn-sm" style="width:100%;justify-content:center;margin-bottom:6px;">∞ 极限</a>
      <a href="/exhibit/derivatives" class="btn btn-sm" style="width:100%;justify-content:center;margin-bottom:6px;">∆ 导数</a>
      <a href="/exhibit/series" class="btn btn-sm" style="width:100%;justify-content:center;">∑ 级数</a>
    </div>
  </div>

  <!-- Right: Plot Area -->
  <div class="workshop-main">
    <div class="workshop-plot-area" id="wsPlotArea">
      <div class="ws-placeholder" id="wsPlaceholder">
        <div style="text-align:center;color:var(--text-muted);">
          <p style="font-size:48px;margin:0;">📐</p>
          <p style="margin:12px 0;font-size:15px;">在左侧输入函数，点击「绘制」</p>
          <p style="font-size:12px;">或点击预设按钮快速体验</p>
        </div>
      </div>
    </div>
    <div id="wsLoading" style="display:none;text-align:center;padding:16px;color:var(--accent);">
      <span class="spinner" style="display:inline-block;margin-right:8px;"></span> AI 正在生成图像...
    </div>
    <div id="wsExplanation" style="display:none;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:20px;margin:12px 0;font-size:14px;line-height:1.8;"></div>
  </div>
</div>

<script>
var wsMode = '2d';

function workshopSetMode(m) {
  wsMode = m;
  document.querySelectorAll('.ws-mode-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.mode === m); });
  document.getElementById('wsInputStd').style.display = (m === '2d' || m === '3d') ? '' : 'none';
  document.getElementById('wsInputAI').style.display = (m === 'ai') ? '' : 'none';
  document.getElementById('ws2DFields').style.display = (m === '2d') ? '' : 'none';
  document.getElementById('ws3DFields').style.display = (m === '3d') ? '' : 'none';
  document.getElementById('wsExplanation').style.display = 'none';
}

function workshopPreset(func) {
  document.getElementById('funcInput').value = func;
}

function workshopPlot() {
  var plotArea = document.getElementById('wsPlotArea');
  var placeholder = document.getElementById('wsPlaceholder');
  if (placeholder) placeholder.style.display = 'none';
  var loading = document.getElementById('wsLoading');
  var explanation = document.getElementById('wsExplanation');
  explanation.style.display = 'none';

  if (wsMode === 'ai') {
    var desc = document.getElementById('aiDesc').value.trim();
    if (!desc) { alert('请输入描述'); return; }
    plotAI(desc, plotArea, loading, explanation);
  } else if (wsMode === '2d') {
    var funcs = document.getElementById('funcInput').value.trim().split('\n').filter(function(f){return f.trim();});
    if (!funcs.length) { alert('请输入函数'); return; }
    var xMin = parseFloat(document.getElementById('xMin').value) || -6;
    var xMax = parseFloat(document.getElementById('xMax').value) || 6;
    var showDeriv = document.getElementById('showDerivative').checked;
    plot2D(funcs, xMin, xMax, showDeriv, plotArea);
  } else {
    var funcs = document.getElementById('funcInput').value.trim().split('\n').filter(function(f){return f.trim();});
    if (!funcs.length) { alert('请输入函数'); return; }
    plot3D(funcs, plotArea);
  }
}

function plot2D(funcs, xMin, xMax, showDeriv, plotArea) {
  var N = 800;
  var traces = [];

  funcs.forEach(function(func, idx) {
    var xs = [], ys = [];
    for (var i = 0; i <= N; i++) {
      var xv = xMin + (xMax - xMin) * i / N;
      xs.push(xv);
      try {
        var yv = evaluate1D(func, xv);
        ys.push(isFinite(yv) ? yv : null);
      } catch(e) { ys.push(null); }
    }
    traces.push({ x: xs, y: ys, type: 'scatter', mode: 'lines', name: func.trim(), line: { width: 2 } });
  });

  // Add derivative if requested
  if (showDeriv) {
    funcs.forEach(function(func, idx) {
      var xs = [], dys = [];
      var dx = (xMax - xMin) / N;
      for (var i = 1; i <= N; i++) {
        var xv = xMin + (xMax - xMin) * i / N;
        xs.push(xv);
        try {
          var y1 = evaluate1D(func, xv - dx);
          var y2 = evaluate1D(func, xv);
          var dy = (y2 - y1) / dx;
          dys.push(isFinite(dy) ? dy : null);
        } catch(e) { dys.push(null); }
      }
      traces.push({ x: xs, y: dys, type: 'scatter', mode: 'lines', name: func.trim() + "'", line: { width: 1.5, dash: 'dash' }, opacity: 0.6 });
    });
  }

  var layout = {
    title: funcs.join(', '),
    xaxis: { title: 'x', zeroline: true },
    yaxis: { title: 'y', zeroline: true },
    margin: { t:50, r:20, b:50, l:50 },
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    showlegend: funcs.length > 1 || showDeriv
  };
  Plotly.newPlot(plotArea, traces, layout, { responsive: true });
}

function plot3D(funcs, plotArea) {
  var N = 80;
  var minV = -5, maxV = 5;
  var xs = [], ys = [];
  for (var i = 0; i < N; i++) { xs.push(minV + (maxV-minV)*i/(N-1)); ys.push(minV + (maxV-minV)*i/(N-1)); }

  var traces = [];
  funcs.forEach(function(func, idx) {
    var zs = [];
    for (var i = 0; i < N; i++) {
      var row = [];
      for (var j = 0; j < N; j++) {
        try {
          var z = evaluate2D(func, xs[i], ys[j]);
          row.push(isFinite(z) ? z : null);
        } catch(e) { row.push(null); }
      }
      zs.push(row);
    }
    traces.push({
      x: xs, y: ys, z: zs, type: 'surface', name: func.trim(),
      colorscale: ['Viridis','Plasma','Turbo'][idx % 3],
      showscale: idx === 0,
      opacity: 0.9
    });
  });

  var layout = {
    title: funcs.join(', '),
    scene: {
      xaxis: { title: 'x' },
      yaxis: { title: 'y' },
      zaxis: { title: 'z' }
    },
    margin: { t:50, r:20, b:50, l:50 },
    paper_bgcolor: 'rgba(0,0,0,0)'
  };
  Plotly.newPlot(plotArea, traces, layout, { responsive: true });
}

async function plotAI(desc, plotArea, loading, explanation) {
  loading.style.display = 'block';
  plotArea.innerHTML = '';

  try {
    var apiKey = '';
    try { apiKey = localStorage.getItem('mathlearnlab:apikey') || ''; } catch(e) {}
    var resp = await fetch('/api/workshop/plot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
      body: JSON.stringify({ description: desc }),
    });
    if (!resp.ok) throw new Error((await resp.json()).detail || 'API error');
    var data = await resp.json();

    if (data.code) {
      try {
        var fn = new Function('Plotly', 'document', 'data', data.code);
        fn(Plotly, document, null);
      } catch(e) {
        plotArea.innerHTML = '<div style="padding:40px;text-align:center;color:var(--accent-error);"><p>执行代码出错: ' + e.message + '</p><pre style="font-size:11px;text-align:left;max-height:200px;overflow:auto;">' + escapeHtml(data.code) + '</pre></div>';
      }
    } else {
      plotArea.innerHTML = '<div style="padding:60px;text-align:center;color:var(--text-muted);">AI 暂未返回图像代码。请检查 API Key 配置。</div>';
    }

    if (data.explanation) {
      explanation.innerHTML = '<h4 style="margin:0 0 8px;font-family:var(--font-heading);">数学解释</h4>' + data.explanation;
      explanation.style.display = 'block';
    }
  } catch(e) {
    plotArea.innerHTML = '<div style="padding:40px;text-align:center;color:var(--accent-error);"><p>AI 生成失败: ' + e.message + '</p></div>';
  }
  loading.style.display = 'none';
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 1D evaluator
function evaluate1D(expr, x) {
  expr = expr.replace(/\^/g, '**');
  var safe = expr
    .replace(/sin\(/g, '__sin(').replace(/cos\(/g, '__cos(').replace(/tan\(/g, '__tan(')
    .replace(/exp\(/g, '__exp(').replace(/log\(/g, '__log(').replace(/sqrt\(/g, '__sqrt(')
    .replace(/abs\(/g, '__abs(').replace(/pi/gi, '__PI').replace(/e(?![xp\(])/gi, '__E');
  safe = safe.replace(/__sin/g,'Math.sin').replace(/__cos/g,'Math.cos').replace(/__tan/g,'Math.tan')
    .replace(/__exp/g,'Math.exp').replace(/__log/g,'Math.log').replace(/__sqrt/g,'Math.sqrt')
    .replace(/__abs/g,'Math.abs').replace(/__PI/g,'Math.PI').replace(/__E/g,'Math.E');
  return eval(safe);
}

// 2D evaluator (for 3D surfaces)
function evaluate2D(expr, x, y) {
  expr = expr.replace(/\^/g, '**');
  var safe = expr
    .replace(/sin\(/g, '__sin(').replace(/cos\(/g, '__cos(')
    .replace(/exp\(/g, '__exp(').replace(/sqrt\(/g, '__sqrt(')
    .replace(/abs\(/g, '__abs(').replace(/pi/gi, '__PI');
  safe = safe.replace(/__sin/g,'Math.sin').replace(/__cos/g,'Math.cos')
    .replace(/__exp/g,'Math.exp').replace(/__sqrt/g,'Math.sqrt')
    .replace(/__abs/g,'Math.abs').replace(/__PI/g,'Math.PI');
  return eval(safe);
}

// Enter key triggers plot
document.getElementById('funcInput').addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') workshopPlot();
});
document.getElementById('aiDesc').addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') workshopPlot();
});

// URL persistence: load function from ?f= query param
(function() {
  var params = new URLSearchParams(window.location.search);
  var f = params.get('f');
  if (f) {
    document.getElementById('funcInput').value = decodeURIComponent(f);
    workshopPlot();
  }
  var m = params.get('m');
  if (m && (m === '2d' || m === '3d' || m === 'ai')) workshopSetMode(m);
})();

// Update URL when plotting
var _origPlot = workshopPlot;
workshopPlot = function() {
  var funcs = document.getElementById('funcInput').value.trim();
  var desc = document.getElementById('aiDesc').value.trim();
  var query = '?m=' + wsMode;
  if (wsMode === 'ai' && desc) query += '&f=' + encodeURIComponent(desc);
  else if (funcs) query += '&f=' + encodeURIComponent(funcs);
  if (window.location.search !== query) {
    window.history.replaceState({}, '', window.location.pathname + query);
  }
  _origPlot();
};
</script>
{% endblock %}
