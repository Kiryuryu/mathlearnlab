<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}数学博物馆{% endblock %} — 知其然，知其所以然</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/museum.css">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#4a6a8a">

  <!-- MathJax (async) -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']], processEscapes: true },
      svg: { fontCache: 'global' },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <a href="/" class="app-brand">数学博物馆</a>
      <span class="app-subtitle">知其然，知其所以然</span>
    </div>
    <div class="header-right">
      <button class="header-btn" id="apiKeyBtn" title="设置 API Key" onclick="toggleApiKeyModal()">
        <span id="apiKeyStatus" style="width:7px;height:7px;border-radius:50%;display:inline-block;background:var(--accent-error);"></span>
      </button>
      <div class="search-container" id="searchContainer">
        <button class="search-btn" onclick="toggleSearch()" title="搜索">🔍</button>
        <input type="text" id="searchInput" placeholder="搜索概念、人物、公式..." oninput="doSearch()" onkeydown="if(event.key==='Escape')closeSearch()">
        <div class="search-results" id="searchResults"></div>
      </div>
      <button class="header-btn" id="themeToggle" title="切换明暗" aria-label="切换深色/浅色模式">◐</button>
      <button class="header-btn" id="userBtn" onclick="toggleAuthModal()" title="登录" style="font-size:13px;width:auto;padding:4px 10px;">登录</button>
    </div>
  </header>

  <!-- Top Museum Nav -->
  <nav class="museum-nav" id="museumNav">
    <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">大厅</a>
    <span class="nav-sep">|</span>
    <a href="/gaoshu" class="{% if request.url.path.startswith('/gaoshu') or request.url.path.startswith('/exhibit/') %}active{% endif %}">展区</a>
    <span class="nav-sep">|</span>
    <a href="/mathematicians" class="{% if request.url.path.startswith('/mathematicians') %}active{% endif %}">数学家长廊</a>
    <a href="/workshop" class="{% if request.url.path.startswith('/workshop') %}active{% endif %}">函数工坊</a>
    <span class="nav-sep">|</span>
    <a href="/fractal" class="{% if request.url.path.startswith('/fractal') %}active{% endif %}">分形</a>
    <a href="/practice" class="{% if request.url.path.startswith('/practice') %}active{% endif %}">练习</a>
  </nav>

  <!-- Body -->
  <div class="app-body" style="flex-direction:column;">
    <!-- Main -->
    <main style="flex:1; overflow-y:auto; max-width:100%;">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Floating Chat Button -->
  <button class="chat-float-btn" id="chatFloatBtn" onclick="MuseumChat.toggle()" title="AI 助手">💬</button>

  <!-- Chat Popup -->
  <div class="chat-popup" id="chatPopup" style="display:none;">
      <div class="chat-popup-header">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span style="font-size:11px;color:var(--text-muted);">模型:</span>
          <input type="text" id="chatModelInput" placeholder="模型 ID" style="width:180px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;background:var(--bg-input);color:var(--text-primary);font-family:var(--font-mono);">
          <button class="btn btn-sm" onclick="MuseumChat.setModel('deepseek-chat')" style="font-size:10px;padding:2px 6px;">V4 Pro</button>
          <button class="btn btn-sm" onclick="MuseumChat.setModel('deepseek-chat')" style="font-size:10px;padding:2px 6px;">V4 Flash</button>
          <button class="btn btn-sm" onclick="MuseumChat.setModel('deepseek-reasoner')" style="font-size:10px;padding:2px 6px;">R1</button>
        </div>
        <div>
          <button onclick="MuseumChat.newSession()" title="新会话">+</button>
          <button onclick="MuseumChat.toggle()" title="关闭">✕</button>
        </div>
      </div>
    <!-- Custom model config (hidden by default) -->
    <div id="customModelConfig" style="display:none;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;">
      <input id="customModelId" placeholder="Model ID" style="width:100%;padding:4px 8px;margin-bottom:4px;border:1px solid var(--border);border-radius:4px;font-size:12px;">
      <input id="customApiKey" type="password" placeholder="API Key (留空用服务器默认)" style="width:100%;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;">
      <button onclick="MuseumChat.saveCustomModel()" style="margin-top:4px;padding:3px 12px;font-size:12px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;">保存</button>
    </div>
    <div class="chat-popup-messages" id="chatPopupMessages">
      <div style="text-align:center;color:var(--text-muted);padding:24px 12px;font-size:13px;">
        <p>有不懂的概念随时问。</p>
        <p id="chatContextHint" style="color:var(--accent);font-size:12px;margin-top:8px;"></p>
      </div>
    </div>
    <div class="chat-popup-input">
      <textarea id="chatPopupInput" placeholder="输入问题..." rows="1" onkeydown="MuseumChat.onKeydown(event)"></textarea>
      <button id="chatPopupSend" onclick="MuseumChat.send()">发送</button>
    </div>
  </div>

  <!-- API Key Modal -->
  <div class="modal-overlay" id="apiKeyModal" hidden>
    <div class="modal">
      <h3>配置 API Key</h3>
      <p class="modal-hint">使用 AI 功能需要你的 DeepSeek API Key。获取 Key：platform.deepseek.com</p>
      <p class="modal-hint" style="font-size:11px;color:var(--accent-warm);">Key 仅存储在浏览器本地，不会上传到服务器。获取 Key：<a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a></p>
      <input type="password" id="apiKeyInput" placeholder="sk-..." class="input-full">
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveApiKey()">保存</button>
        <button class="btn" onclick="document.getElementById('apiKeyModal').hidden=true;">取消</button>
      </div>
    </div>
  </div>

  <!-- Login Dialog -->
  <div id="loginBox" class="login-box">
    <div class="login-left">
      <div class="login-logo">数学博物馆</div>
      <div class="login-sub">记录学习轨迹<br>解锁完整功能</div>
    </div>
    <div class="login-right">
      <div class="login-tabs">
        <span class="login-tab" id="loginTab1" onclick="switchAuthTab('login')">登录</span>
        <span class="login-tab on" id="loginTab2" onclick="switchAuthTab('register')">注册</span>
      </div>
      <div id="loginPanel" style="display:none">
        <input id="loginUsername" placeholder="用户名" class="login-inp">
        <input id="loginPassword" type="password" placeholder="密码" class="login-inp" onkeydown="if(event.key==='Enter')doLogin()">
        <p id="authMsg" class="login-err"></p>
        <button class="login-btn" onclick="doLogin()">登录</button>
        <p style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:10px;">没有账号？<a href="javascript:switchAuthTab('register')" style="color:var(--accent);">点这里注册</a></p>
      </div>
      <div id="regPanel" style="display:none">
        <input id="regUsername" placeholder="用户名（至少3位）" class="login-inp">
        <input id="regEmail" placeholder="邮箱（选填）" class="login-inp">
        <input id="regPassword" type="password" placeholder="密码（至少6位）" class="login-inp">
        <select id="regModel" class="login-inp" style="font-family:var(--font-mono);font-size:13px">
          <option value="deepseek-chat">DeepSeek V4 Pro</option>
          <option value="deepseek-chat">DeepSeek V4 Flash</option>
          <option value="deepseek-reasoner">DeepSeek R1</option>
        </select>
        <input id="regApiKey" type="password" placeholder="DeepSeek API Key（sk-...）" class="login-inp" style="font-family:var(--font-mono);font-size:12px">
        <p id="regMsg" class="login-err"></p>
        <button class="login-btn" onclick="doRegister()">注册</button>
      </div>
    </div>
  </div>

  <script src="/static/js/theme.js"></script>
  <script src="/static/js/chat_float.js"></script>
  <script src="/static/js/practice_v2.js"></script>
  <script src="/static/js/museum.js"></script>

  <!-- Plotly.js — deferred, does not block initial render -->
  <script src="https://cdn.jsdelivr.net/npm/plotly.js@2.35.2/dist/plotly.min.js" defer></script>
  <!-- Search -->
  <script>
  var searchTimer = null;
  function toggleSearch() {
    var c = document.getElementById('searchContainer');
    var inp = document.getElementById('searchInput');
    c.classList.toggle('open');
    if (c.classList.contains('open')) { inp.focus(); }
    else { inp.value = ''; document.getElementById('searchResults').classList.remove('show'); }
  }
  function closeSearch() {
    document.getElementById('searchContainer').classList.remove('open');
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').classList.remove('show');
  }
  function doSearch() {
    clearTimeout(searchTimer);
    var q = document.getElementById('searchInput').value.trim();
    var results = document.getElementById('searchResults');
    if (!q) { results.classList.remove('show'); return; }
    searchTimer = setTimeout(function() {
      fetch('/api/search?q=' + encodeURIComponent(q))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var html = '';
          if (data.results && data.results.length) {
            data.results.forEach(function(r) {
              html += '<a href="' + r.route + '" class="search-result-item"><span class="sr-title">' + escapeHtml(r.title) + '</span><span style="font-size:11px;color:var(--accent);margin-left:6px;">' + r.section + '</span><div class="sr-excerpt">' + escapeHtml(r.excerpt) + '</div></a>';
            });
          } else {
            html = '<div class="search-no-results">未找到匹配内容</div>';
          }
          results.innerHTML = html;
          results.classList.add('show');
        });
    }, 250);
  }
  function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-container')) closeSearch();
  });
  // API Key management
  function toggleApiKeyModal() {
    var m = document.getElementById('apiKeyModal');
    var k = localStorage.getItem('mathlearnlab:apikey') || '';
    document.getElementById('apiKeyInput').value = k;
    m.hidden = !m.hidden;
  }
  function saveApiKey() {
    var k = document.getElementById('apiKeyInput').value.trim();
    try { localStorage.setItem('mathlearnlab:apikey', k); } catch(e) {}
    document.getElementById('apiKeyModal').hidden = true;
    updateApiKeyStatus();
  }
  // Auth
  var authToken = localStorage.getItem('mathlearnlab:token') || '';
  var authUser = null;
  try { authUser = JSON.parse(localStorage.getItem('mathlearnlab:user') || 'null'); } catch(e) {}
  function updateUserUI() {
    var btn = document.getElementById('userBtn');
    if (authUser) {
      btn.textContent = authUser.username;
      btn.title = '退出登录';
      btn.onclick = function() { localStorage.removeItem('mathlearnlab:token'); localStorage.removeItem('mathlearnlab:user'); authToken=''; authUser=null; updateUserUI(); showAuthModal(); };
    } else {
      btn.textContent = '登录';
      btn.title = '登录';
      btn.onclick = function(){}; // dialog already shown, button does nothing
    }
  }
  function showAuthModal() {
    document.getElementById('loginBox').classList.add('show');
  }
  function hideAuthModal() {
    document.getElementById('loginBox').classList.remove('show');
  }
  function switchAuthTab(tab) {
    document.getElementById('loginTab1').classList.toggle('on', tab==='login');
    document.getElementById('loginTab2').classList.toggle('on', tab==='register');
    document.getElementById('loginPanel').style.display = tab==='login' ? '' : 'none';
    document.getElementById('regPanel').style.display = tab==='register' ? '' : 'none';
  }
  async function doLogin() {
    var u = document.getElementById('loginUsername').value.trim();
    var p = document.getElementById('loginPassword').value;
    var msg = document.getElementById('authMsg');
    if (!u || !p) { msg.textContent = '请填写用户名和密码'; msg.style.display=''; return; }
    msg.style.display = 'none';
    try {
      var r = await fetch('/api/auth/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
      var d = await r.json();
      if (!r.ok) throw new Error(d.detail||'登录失败');
      authToken = d.token; authUser = d.user;
      localStorage.setItem('mathlearnlab:token', authToken);
      localStorage.setItem('mathlearnlab:user', JSON.stringify(authUser));
      hideAuthModal();
      updateUserUI();
    } catch(e) { msg.textContent = e.message; msg.style.display=''; }
  }
  async function doRegister() {
    var u = document.getElementById('regUsername').value.trim();
    var e = document.getElementById('regEmail').value.trim();
    var p = document.getElementById('regPassword').value;
    var m = document.getElementById('regModel').value;
    var k = document.getElementById('regApiKey').value.trim();
    var msg = document.getElementById('regMsg');
    if (!u || !p) { msg.textContent = '请填写用户名和密码'; msg.style.display=''; return; }
    if (u.length < 3) { msg.textContent = '用户名至少3位'; msg.style.display=''; return; }
    if (p.length < 6) { msg.textContent = '密码至少6位'; msg.style.display=''; return; }
    if (!k) { msg.textContent = '请输入 DeepSeek API Key'; msg.style.display=''; return; }
    msg.style.display = 'none';
    try {
      var r = await fetch('/api/auth/register', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,email:e})});
      var d = await r.json();
      if (!r.ok) throw new Error(d.detail||'注册失败');
      authToken = d.token; authUser = d.user;
      localStorage.setItem('mathlearnlab:token', authToken);
      localStorage.setItem('mathlearnlab:user', JSON.stringify(authUser));
      // Save model and API key
      localStorage.setItem('museum:model', m);
      localStorage.setItem('mathlearnlab:apikey', k);
      hideAuthModal();
      updateUserUI();
      updateApiKeyStatus();
    } catch(e) { msg.textContent = e.message; msg.style.display=''; }
  }
  updateUserUI();
  // Force login on page load if not authenticated
  if (!authToken) { showAuthModal(); switchAuthTab("register"); }
  // Export helpers for other scripts
  function requireAuth() {
    if (authToken) return true;
    showAuthModal();
    return false;
  }
  window.requireAuth = requireAuth;
  window.getAuthToken = function() { return authToken; };
  updateApiKeyStatus();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
