<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}数学博物馆{% endblock %} — 知其然，知其所以然</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/museum.css">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']], processEscapes: true },
      svg: { fontCache: 'global' },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <!-- Plotly.js for visualizations -->
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
.modal-overlay { display: none !important; }
.modal-overlay:not([hidden]) { display: flex !important; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 100; }
</style>
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <a href="/" class="app-brand">数学博物馆</a>
      <span class="app-subtitle">知其然，知其所以然</span>
    </div>
    <div class="header-right">
      <button class="header-btn" id="themeToggle" title="切换明暗" onclick="Museum.toggleTheme()">◐</button>
    </div>
  </header>

  <!-- Top Museum Nav -->
  <nav class="museum-nav" id="museumNav">
    <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">🏛 大厅</a>
    <span class="nav-sep">|</span>
    {% for key, e in settings.exhibits.items() %}
    <a href="/exhibit/{{ key }}" class="{% if request.url.path.startswith('/exhibit/' + key) %}active{% endif %}">{{ e.icon }} {{ e.zh.split('—')[0].strip() if e.zh else key }}</a>
    {% endfor %}
    <span class="nav-sep">|</span>
    <a href="/practice/integrals">🧪 实验室</a>
    <a href="/error-log">📋 错题本</a>
  </nav>

  <!-- Body -->
  <div class="app-body" style="flex-direction:column;">
    <!-- Main -->
    <main style="flex:1; overflow-y:auto; max-width:100%;">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Floating Chat Button -->
  <button class="chat-float-btn" id="chatFloatBtn" onclick="MuseumChat.toggle()" title="AI 助手">💬</button>

  <!-- Chat Popup -->
  <div class="chat-popup" id="chatPopup" hidden>
    <div class="chat-popup-header">
      <select id="chatModelSelect" onchange="MuseumChat.setModel(this.value)">
        <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
        <option value="claude-haiku-4-5-20251001">Claude Haiku (快)</option>
        <option value="claude-opus-4-20250514">Claude Opus 4</option>
        <option value="custom">自定义...</option>
      </select>
      <div>
        <button onclick="MuseumChat.newSession()" title="新会话">+</button>
        <button onclick="MuseumChat.toggle()" title="关闭">✕</button>
      </div>
    </div>
    <!-- Custom model config (hidden by default) -->
    <div id="customModelConfig" style="display:none;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;">
      <input id="customModelId" placeholder="Model ID" style="width:100%;padding:4px 8px;margin-bottom:4px;border:1px solid var(--border);border-radius:4px;font-size:12px;">
      <input id="customApiKey" type="password" placeholder="API Key (留空用服务器默认)" style="width:100%;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;">
      <button onclick="MuseumChat.saveCustomModel()" style="margin-top:4px;padding:3px 12px;font-size:12px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;">保存</button>
    </div>
    <div class="chat-popup-messages" id="chatPopupMessages">
      <div style="text-align:center;color:var(--text-muted);padding:24px 12px;font-size:13px;">
        <p>有不懂的概念随时问。</p>
        <p id="chatContextHint" style="color:var(--accent);font-size:12px;margin-top:8px;"></p>
      </div>
    </div>
    <div class="chat-popup-input">
      <textarea id="chatPopupInput" placeholder="输入问题..." rows="1" onkeydown="MuseumChat.onKeydown(event)"></textarea>
      <button id="chatPopupSend" onclick="MuseumChat.send()">发送</button>
    </div>
  </div>

  <!-- API Key Modal -->
  <div class="modal-overlay" id="apiKeyModal" hidden>
    <div class="modal">
      <h3>设置 Anthropic API Key</h3>
      <p class="modal-hint">你的 Key 仅存于浏览器本地，不经过服务器存储。</p>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." class="input-full">
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="var k=document.getElementById('apiKeyInput').value.trim();try{localStorage.setItem('mathlearnlab:apikey',k)}catch(e){};document.getElementById('apiKeyModal').hidden=true;">保存</button>
        <button class="btn" onclick="document.getElementById('apiKeyModal').hidden=true;">取消</button>
      </div>
    </div>
  </div>

  <script src="/static/js/theme.js"></script>
  <script src="/static/js/chat_float.js"></script>
  <script src="/static/js/practice_v2.js"></script>
  <script src="/static/js/museum.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
